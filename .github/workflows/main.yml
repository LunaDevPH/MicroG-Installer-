name: Run Build And Package Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect Change and Bump Version
        id: versioning
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD || echo "first_run")
          
          BUMP_TYPE="patch"
          if echo "$CHANGED_FILES" | grep -E '(\.sh$|\.apk$|^system/|^module\.prop)'; then
            BUMP_TYPE="minor"
          elif echo "$CHANGED_FILES" | grep -E '(README\.md|banner\.png|^\.github/)'; then
            BUMP_TYPE="patch"
          fi

          CURRENT_VER=$(grep "^version=" module.prop | cut -d= -f2 | tr -d ' ')
          CURRENT_VCODE=$(grep "^versionCode=" module.prop | cut -d= -f2 | tr -d ' ')
          
          IFS='.' read -r major minor patch <<< "$CURRENT_VER"

          if [ "$BUMP_TYPE" == "minor" ]; then
            NEW_VER="$major.$((minor + 1)).0"
          else
            NEW_VER="$major.$minor.$((patch + 1))"
          fi
          NEW_VCODE=$((CURRENT_VCODE + 1))

          sed -i "s/^version=.*/version=$NEW_VER/" module.prop
          sed -i "s/^versionCode=.*/versionCode=$NEW_VCODE/" module.prop
          
          cat <<EOF > update.json
          {
            "version": "v$NEW_VER",
            "versionCode": $NEW_VCODE,
            "zipUrl": "https://github.com/${{ github.repository }}/releases/download/v$NEW_VER/MicroG-Installer.zip",
            "changelog": "https://raw.githubusercontent.com/${{ github.repository }}/main/README.md"
          }
EOF

          echo "VERSION=$NEW_VER" >> $GITHUB_OUTPUT
          echo "VCODE=$NEW_VCODE" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Build Module
        run: make all

      - name: Commit Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add module.prop update.json
          git commit -m "chore: release v${{ steps.versioning.outputs.VERSION }} [skip ci]" || echo "No changes"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.versioning.outputs.VERSION }}
          files: "*.zip"
          generate_release_notes: true
          body: "Automated build: v${{ steps.versioning.outputs.VERSION }} (Code: ${{ steps.versioning.outputs.VCODE }})"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
