name: Makefile CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Handle Versioning
        id: versioning
        run: |
          # Create version.prop if it doesn't exist
          if [ ! -f version.prop ]; then
            echo "1.0.0" > version.prop
            echo "VERSION=1.0.0" >> $GITHUB_OUTPUT
          else
            # Read current version and bump the last digit (Patch)
            CURRENT_VER=$(cat version.prop)
            BASE_VER=$(echo $CURRENT_VER | cut -d. -f1-2)
            PATCH=$(echo $CURRENT_VER | cut -d. -f3)
            NEW_VER="$BASE_VER.$((PATCH + 1))"
            echo $NEW_VER > version.prop
            echo "VERSION=$NEW_VER" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Build Module
        run: make all

      - name: Commit Version Bump
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add version.prop
          git commit -m "chore: bump version to ${{ steps.versioning.outputs.VERSION }}" || echo "No changes to commit"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.versioning.outputs.VERSION }}
          files: "*.zip"
          generate_release_notes: true
          body: "Automated build for version ${{ steps.versioning.outputs.VERSION }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
